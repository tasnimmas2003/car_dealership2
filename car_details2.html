<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>تفاصيل السيارة</title>
    <style>
        body { font-family: Arial; padding: 20px; text-align: center; }
        .car-detail { border: 1px solid #ddd; padding: 20px; max-width: 500px; margin: auto; border-radius: 10px; }
        button { padding: 10px 20px; background: #333; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="car-detail">
        <h1 id="carName">تويوتا كامري</h1>
        <p><strong>السعر:</strong> <span id="carPrice">120,000</span> ر.س</p>
        <p><strong>الموديل:</strong> <span id="carYear">2024</span></p>
        <p><strong>المحرك:</strong> <span id="carEngine">2.5L</span></p>
        <p><strong>ناقل الحركة:</strong> <span id="carTrans">أوتوماتيك</span></p>
        <br>
        <button onclick="window.location.href='index.html'">← العودة للقائمة</button>
    </div>
</body>
</html>
